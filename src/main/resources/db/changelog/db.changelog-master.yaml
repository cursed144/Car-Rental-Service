databaseChangeLog:
  - changeSet:
      id: 1-create-roles
      author: student
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true

  - changeSet:
      id: 2-create-users
      author: student
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: users
            baseColumnNames: role_id
            referencedTableName: roles
            referencedColumnNames: id
            constraintName: fk_users_role

  - changeSet:
      id: 3-insert-roles
      author: student
      changes:
        - insert:
            tableName: roles
            columns:
              - column:
                  name: name
                  value: ADMIN

        - insert:
            tableName: roles
            columns:
              - column:
                  name: name
                  value: USER

  - changeSet:
      id: 4-create-cars
      author: student
      changes:
        - createTable:
            tableName: cars
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: brand
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: model
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: production_year
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: fuel_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: price_per_day
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false

  - changeSet:
      id: 5-create-car-details
      author: student
      changes:
        - createTable:
            tableName: car_details
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: mileage
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: color
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: seats
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: transmission
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: car_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true

        - addForeignKeyConstraint:
            baseTableName: car_details
            baseColumnNames: car_id
            referencedTableName: cars
            referencedColumnNames: id
            constraintName: fk_car_details_car

  - changeSet:
      id: 6-create-services
      author: student
      changes:
        - createTable:
            tableName: services
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: description
                  type: VARCHAR(500)

  - changeSet:
      id: 7-create-car-services
      author: student
      changes:
        - createTable:
            tableName: car_services
            columns:
              - column:
                  name: car_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: service_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: car_services
            columnNames: car_id, service_id
            constraintName: pk_car_services

        - addForeignKeyConstraint:
            baseTableName: car_services
            baseColumnNames: car_id
            referencedTableName: cars
            referencedColumnNames: id
            constraintName: fk_car_services_car

        - addForeignKeyConstraint:
            baseTableName: car_services
            baseColumnNames: service_id
            referencedTableName: services
            referencedColumnNames: id
            constraintName: fk_car_services_service